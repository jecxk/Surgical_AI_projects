# ResNet50 + Temporal Transformer Configuration

model:
  backbone: "resnet50"
  feature_dim: 2048
  temporal_model: "transformer"
  dropout: 0.3
  
  transformer:
    num_heads: 8
    num_layers: 4
    dim_feedforward: 1024
    max_seq_length: 2048

training:
  batch_size: 4  # Transformer uses more memory
  epochs: 50
  optimizer:
    lr: 5.0e-5
    backbone_lr: 5.0e-6
