# ResNet50 + LSTM Configuration
# Inherits from default.yaml

model:
  backbone: "resnet50"
  feature_dim: 2048
  temporal_model: "lstm"
  dropout: 0.3
  
  lstm:
    hidden_dim: 512
    num_layers: 2
    bidirectional: true

training:
  batch_size: 8
  epochs: 50
  optimizer:
    lr: 1.0e-4
    backbone_lr: 1.0e-5
