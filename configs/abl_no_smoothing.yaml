# ============================================
# ABLATION 4: No temporal smoothing at inference
# Base: M1 (ResNet50 + LSTM)
# Note: chỉ khác ở post-processing — KHÔNG cần re-train,
#       chỉ cần evaluate lại bằng compare_temporal_smoothing.py
#       (eval rất nhanh, ~5 phút)
# ============================================

project:
  num_workers: 2

data:
  sequence_length: 8
  stride: 4

model:
  backbone: "resnet50"
  feature_dim: 2048
  temporal_model: "lstm"
  lstm: {hidden_dim: 512, num_layers: 2, bidirectional: true}
  dropout: 0.3
  multi_task: true
  tool_detection: true
  tool_loss_weight: 0.5

training:
  epochs: 15
  batch_size: 4
  use_amp: true
  optimizer: {type: "adamw", lr: 1.0e-4, backbone_lr: 1.0e-5, weight_decay: 1.0e-4}
  loss: {type: "cross_entropy", label_smoothing: 0.1, class_weights: "auto"}
  staged_training: true
  stage1_epochs: 3
  stage2_epochs: 6
  stage3_epochs: 6
  save_every: 2
  early_stopping: {patience: 4, metric: "val_f1", mode: "max"}

evaluation:
  temporal_smoothing:
    enabled: false           # <<< KEY DIFFERENCE
